<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grow Green | Bulk Image Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #0A0A0A; color: #FFFFFF; }</style>
</head>
<body class="p-10 flex items-center justify-center h-screen">
    <div class="w-full max-w-md bg-[#111] border border-[#222] rounded-2xl p-8 shadow-2xl text-center">

        <div class="w-16 h-16 bg-[#1A1A1A] rounded-full flex items-center justify-center mx-auto mb-6 border border-[#333]">
            <svg class="w-8 h-8 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </div>

        <h2 class="text-xl font-bold uppercase tracking-widest text-white mb-2">Smart Image Matcher</h2>
        <p class="text-xs text-gray-400 mb-8 leading-relaxed">Select multiple images at once. The system will look at the image file name (e.g. <strong>"PANTENE SHAMPOO.jpg"</strong>) and automatically assign it to the matching product in your database.</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="images" accept="image/*" multiple required class="w-full bg-[#1A1A1A] border border-[#333] text-gray-400 p-4 rounded-lg outline-none mb-6 cursor-pointer text-sm">

            <button type="submit" class="w-full bg-gradient-to-r from-[#E6C875] to-[#D4AF37] text-black font-bold uppercase tracking-widest text-xs px-8 py-4 rounded-lg hover:scale-105 transition shadow-lg">Upload & Match Images</button>
        </form>

        <a href="{% url 'custom_admin_dashboard' %}" class="block mt-6 text-xs text-gray-500 uppercase tracking-widest hover:text-white transition">Cancel & Go Back</a>
    </div>
</body>
</html>
